<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finaxis Excel Panel</title>

    <!-- Framework de Office.js (Requisito fundamental) -->
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js" type="text/javascript"></script>

    <!-- CSS del panel -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />

    <!-- Script de Funciones (Para Shared Runtime) -->
    <script src="/excel-addon/src/functions/functions.js" type="text/javascript"></script>
</head>

<body class="ms-font-m">
    <div id="app-body">
        <div class="header">
            <!-- Asumiendo el logo de la empresa -->
            <h1>FINAXIS</h1>
            <p>Conecta tu Excel con la nube contable</p>
        </div>

        <main>
            <!-- Formulario de Login -->
            <div id="login-container" class="container active">
                <h2>Iniciar Sesión</h2>
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="usuario@empresa.com" />
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="********" />
                </div>
                <button id="login-btn" class="primary-btn">Conectar</button>
                <div id="login-error" class="error-msg"></div>
            </div>

            <!-- Panel de Empresa Activa (Aparece tras login) -->
            <div id="dashboard-container" class="container">
                <div class="success-icon">✔️</div>
                <h2>Conectado con Éxito</h2>
                <p>Usuario: <strong id="user-display">---</strong></p>

                <div class="input-group">
                    <label for="empresa-select">Empresa Activa para Fórmulas</label>
                    <select id="empresa-select"></select>
                </div>

                <div class="info-box">
                    <strong>Fórmula Lista:</strong>
                    <br>
                    <code style="user-select: all;">=FINAXIS.SALDO("110505"; "2026-03")</code>
                </div>

                <button id="logout-btn" class="secondary-btn">Cerrar Sesión</button>
            </div>

            <!-- Área de Depuración (Para ver errores en Excel Web) -->
            <div id="debug-log"
                style="margin-top:20px; font-size:10px; color:#94a3b8; border-top:1px solid #e2e8f0; padding-top:10px; font-family:monospace; white-space:pre-wrap;">
                Consola Finaxis:
            </div>
        </main>
    </div>

    <!-- Script Principal con Cache Buster -->
    <script>
        document.write('<script src="taskpane.js?v=' + Date.now() + '"><\/script>');
    </script>
</body>

</html>
